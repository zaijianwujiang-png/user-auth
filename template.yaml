AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: user-auth v1 - 用户注册/登录/当前用户 (Lambda + API Gateway + DynamoDB)

# Parameters: 部署时可传入的参数
Parameters:
  JwtSecret:
    Type: String
    NoEcho: true            # 不在日志/控制台里回显(这是密钥)
    Default: dev-secret-change-me-0123456789abcdef
    Description: JWT 签名密钥,生产环境务必用 --parameter-overrides 传入随机强密钥(>=32字节)
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Claude API key(信号提取/交叉验证/事实核查),部署时用 --parameter-overrides 传入
  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: Telegram Bot token(信号与告警推送)
  TelegramChatId:
    Type: String
    NoEcho: true
    Description: 接收推送的 Telegram chat id

# Globals: 所有函数共用的默认设置
Globals:
  # API Gateway 全局开启 CORS —— 自动给每个路由建 OPTIONS 预检处理,
  # 否则浏览器的跨域预检(OPTIONS)会被 403 拒绝,前端报 "Failed to fetch"
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: python3.12

Resources:
  # ---- 后端函数:一个函数处理 3 个接口 ----
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: auth/                 # 代码在 auth/ 文件夹
      Handler: app.lambda_handler    # 入口 = app.py 的 lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref UsersTable   # 把表名传给代码(store.py 读它)
          JWT_SECRET: !Ref JwtSecret    # 把密钥传给代码(security.py 读它)
      Policies:
        # 给函数授予对 Users 表的增删改查权限〔§6〕
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Register:
          Type: Api
          Properties: { Path: /register, Method: post }
        Login:
          Type: Api
          Properties: { Path: /login, Method: post }
        Me:
          Type: Api
          Properties: { Path: /me, Method: get }
        ChangePassword:
          Type: Api
          Properties: { Path: /change-password, Method: post }

  # ---- 大V信号:定时采集/验证/通知函数(specs/3.trump-signal-trader)----
  SignalFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: signal/
      Handler: app.lambda_handler
      # 事实核查用 web search 可能较慢,单独放宽超时(见 tasks.md 风险点)
      Timeout: 120
      MemorySize: 256
      # 注:曾按 review 建议加 ReservedConcurrentExecutions: 1 防执行重叠,但本账号
      # Lambda 并发配额过低(预留 1 会使非预留并发低于最小值 5)被拒,已移除;
      # 重叠执行的竞态由 DynamoDB 条件写(帖子 ID/内容哈希幂等)兜底,不会重复发信号
      Environment:
        Variables:
          SIGNAL_TABLE_NAME: !Ref SignalTable
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          TELEGRAM_CHAT_ID: !Ref TelegramChatId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SignalTable
      Events:
        Poll:
          Type: Schedule            # EventBridge 定时触发,每分钟跑一轮 pipeline
          Properties:
            Schedule: rate(1 minute)

  # ---- 大V信号表:单表设计(帖子/决策记录/哈希索引/源状态)----
  SignalTable:
    Type: AWS::DynamoDB::Table     # SimpleTable 不支持组合主键与 TTL,用完整声明
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: pk, AttributeType: S }
        - { AttributeName: sk, AttributeType: S }
      KeySchema:
        - { AttributeName: pk, KeyType: HASH }
        - { AttributeName: sk, KeyType: RANGE }
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ---- 数据库表:Users ----
  UsersTable:
    Type: AWS::Serverless::SimpleTable   # 简化版 DynamoDB 表声明
    Properties:
      PrimaryKey:
        Name: email                      # 主键 = 邮箱〔§3〕
        Type: String
      # 按用量计费,没人用就不花钱(SimpleTable 默认即按需)

Outputs:
  ApiBaseUrl:
    Description: "前端要用的 API 根网址(后面接 /register /login /me)"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
